<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GPA Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<Button class="btn"><a href="/home.html">Home</a></Button>

  <h1>GPA Calculator</h1>

  <!-- INPUT TABLE -->
  <table id="course-table">
    <thead>
      <tr>
        <th>Course Name</th>
        <th>Grade (0 – 5)</th>
        <th>Credit Units</th>
        <th>Remove</th>
      </tr>
    </thead>
    <tbody id="table-body">
      <!-- Rows injected by JS -->
    </tbody>
  </table>

  <!-- ACTIONS -->
  <div id="actions">
    <button onclick="addRow()">+ Add Course</button>
    <button onclick="calculate()">Calculate GPA</button>
    <button onclick="resetAll()">Reset</button>
    <button onclick="window.print()">Print</button>
  </div>

  <p id="error-msg"></p>

  <!-- RESULTS SECTION -->
  <div id="result-section">
    <h2>Results</h2>
    <p>GPA: <strong id="gpa-value"></strong></p>

    <table id="summary-table">
      <thead>
        <tr>
          <th>Course</th>
          <th>Grade</th>
          <th>Credit Units</th>
          <th>Grade Points</th>
        </tr>
      </thead>
      <tbody id="summary-body"></tbody>
      <tfoot>
        <tr>
          <td colspan="2"><strong>Total</strong></td>
          <td id="total-credits"></td>
          <td id="total-points"></td>
        </tr>
      </tfoot>
    </table>
  </div>

<script src="script.js"></script>

</body>
</html>
